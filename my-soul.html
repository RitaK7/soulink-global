<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soulink – My Soul</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="main-nav">
    <div class="logo">Soulink</div>
    <button class="nav-toggle" id="navToggle"><i class="bi bi-list"></i></button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li aria-current="page"><a href="my-soul.html">My Soul</a></li>
      <li><a href="soul-chart.html">Soul Chart</a></li>
      <li><a href="soul-coach.html">Soul Coach</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>🌟 Your Soul Overview</h1>

    <div class="card">
      <h3>🪪 Basic Info</h3>
      <p><strong>Name:</strong> <span id="name">–</span></p>
      <p><strong>Birthday:</strong> <span id="birthday">–</span></p>
      <p><strong>Country:</strong> <span id="country">–</span></p>
    </div>

    <div class="card">
      <h3>💖 Love Language</h3>
      <p id="loveLanguage">–</p>
    </div>

    <div class="card">
      <h3>🌟 Zodiac Signs</h3>
      <p><strong>Western:</strong> <span id="westernZodiac">–</span></p>
      <p><strong>Chinese:</strong> <span id="chineseZodiac">–</span></p>
    </div>

    <div class="card">
      <h3>🔢 Life Path</h3>
      <p id="lifePathNumber">–</p>
    </div>

    <div class="card">
      <h3>🎨 Interests</h3>
      <p id="hobbies">–</p>
    </div>

    <div class="card">
      <h3>🌈 Values</h3>
      <p id="values">–</p>
    </div>

    <div class="card">
      <h3>🔗 Relationship Type</h3>
      <p id="relationshipType">–</p>
    </div>

    <a class="btn" href="edit-profile.html">Edit Profile</a>
  </main>

  <script>
    // Toggle mobile nav
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
    });

    // Load quiz data
    const data = JSON.parse(localStorage.getItem('soulQuiz') || '{}');

    // Helper: safe text output
    function outputText(id, text) {
      const el = document.getElementById(id);
      el && (el.textContent = text || '–');
    }

    // Helper: list output with proper comma+space
    function outputList(id, field) {
      const el = document.getElementById(id);
      if (!el) return;
      let items = data[field];
      if (Array.isArray(items)) {
        el.textContent = items.length ? items.join(', ') : '–';
      } else if (typeof items === 'string') {
        const parts = items
          .split(',')
          .map(s => s.trim())
          .filter(s => s);
        el.textContent = parts.length ? parts.join(', ') : '–';
      } else {
        el.textContent = '–';
      }
    }

    // Basic fields
    outputText('name', data.name);
    outputText('birthday', data.birthday);
    outputText('country', data.country);

    // Love language & zodiacs
    outputText('loveLanguage', data.loveLanguage);
    outputText('westernZodiac', data.westernZodiac);
    outputText('chineseZodiac', data.chineseZodiac);

    // Life Path Number
    outputText('lifePathNumber', data.lifePathNumber);

    // Interests & Values
    outputList('hobbies', 'hobbies');
    outputList('values', 'values');

    // Relationship Type
    outputText('relationshipType', data.relationshipType);
  </script>
</body>
</html>
