<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink – My Soul</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* fadeIn, avatar, header, cards, buttons (unchanged) */

    /* MOBILE NAV TOGGLE */
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.8rem;
      color: var(--accent);
      cursor: pointer;
    }
    @media (max-width:768px) {
      .nav-toggle { display: block; }
      .nav-links, .auth-buttons {
        display: none;
        position: absolute; top: 100%; right: 0;
        background: var(--nav-bg);
        flex-direction: column;
        gap: 1rem;
        padding: 1rem 2rem;
      }
      .nav-links.open, .auth-buttons.open {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <nav class="main-nav">
    <div class="nav-left">
      <div class="logo">Soulink</div>
    </div>
    <button class="nav-toggle" id="navToggle">☰</button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li><a href="edit-profile.html">Edit Profile</a></li>
      <li><a href="my-soul.html" aria-current="page">My Soul</a></li>
      <li><a href="soul-chart.html">Soul Chart</a></li>
      <li><a href="soul-coach.html">Soul Coach</a></li>
      <li><a href="soulink-match.html">Match</a></li>
      <li><a href="friends.html">Friends</a></li>
      <li><a href="result.html">Results</a></li>
    </ul>
    <div class="auth-buttons">
      <button class="btn-outline">Log In</button>
      <button class="btn-outline signup">Sign Up</button>
    </div>
  </nav>

  <main class="container">
    <div class="profile-header">
      <div style="display:flex; align-items:center;">
        <div class="avatar" id="avatar">R</div>
        <div>
          <h2>Welcome, <span id="name">Rita</span>!</h2>
          <p>Your Soul at a Glance</p>
        </div>
      </div>
      <div id="planTag">🔓 Free</div>
    </div>

    <div class="cards">
      <div class="card">
        <h3>💖 Personal Info</h3>
        <p><strong>Birth Date:</strong> <span id="birthdate"></span></p>
        <p><strong>Country:</strong> <span id="country"></span></p>
        <p><strong>Height:</strong> <span id="height"></span></p>
        <p><strong>Weight:</strong> <span id="weight"></span></p>
        <!-- only show Connection if non-empty -->
        <p id="connRow"><strong>Connection:</strong> <span id="connection"></span></p>
      </div>
      <!-- other cards unchanged -->
    </div>

    <div class="navigation-buttons">
      <a href="quiz.html">← Back to Quiz</a>
      <a href="soul-coach.html">Go to Soul Coach →</a>
    </div>
  </main>

  <script src="my-soul.js"></script>
  <script>
    // nav toggle
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
      document.querySelector('.auth-buttons').classList.toggle('open');
    });
    // hide connection row if empty
    window.addEventListener('DOMContentLoaded', ()=> {
      if (!document.getElementById('connection').textContent.trim()) {
        document.getElementById('connRow').style.display = 'none';
      }
    });
  </script>
</body>
</html>
