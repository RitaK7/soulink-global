<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soulink – My Soul</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #003c43;
      color: #eefefe;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }
    .main-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #002c2f;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.8rem;
      color: #2ae49d;
      font-weight: bold;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: #2ae49d;
      font-size: 1.8rem;
      cursor: pointer;
    }
    .nav-links {
      display: flex;
      gap: 1rem;
      list-style: none;
    }
    .nav-links a {
      color: #eefefe;
      text-decoration: none;
      font-weight: 500;
      padding: .4rem;
      border-radius: 6px;
      transition: background .2s;
    }
    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      background: rgba(42,228,157,0.2);
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
    }
    .card {
      background: #004d4d;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 12px #00fdd8;
      animation: fadeIn 0.8s ease both;
    }
    .card h3 {
      margin-top: 0;
      color: #2ae49d;
    }
    .data-row {
      margin: 0.5rem 0;
    }
    .label {
      font-weight: bold;
    }
    .btn {
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #2ae49d;
      color: #003c43;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,255,208,0.6);
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    @media(max-width:768px) {
      .nav-toggle { display: block; }
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        right: 0;
        background: #002c2f;
        padding: 1rem 2rem;
      }
      .nav-links.open { display: flex; }
    }
  </style>
</head>
<body>
  <nav class="main-nav">
    <div class="logo">Soulink</div>
    <button class="nav-toggle" id="navToggle"><i class="bi bi-list"></i></button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li aria-current="page"><a href="my-soul.html">My Soul</a></li>
      <li><a href="soul-chart.html">Soul Chart</a></li>
      <li><a href="soul-coach.html">Soul Coach</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>🌟 Your Soul Overview</h1>
    <div class="card">
      <h3>🪪 Basic Info</h3>
      <div class="data-row"><span class="label">Name:</span> <span id="name"></span></div>
      <div class="data-row"><span class="label">Birthday:</span> <span id="birthday"></span></div>
      <div class="data-row"><span class="label">Country:</span> <span id="country"></span></div>
    </div>
    <div class="card">
      <h3>💖 Love Language</h3>
      <div class="data-row" id="loveLanguage"></div>
    </div>
    <div class="card">
      <h3>🌟 Zodiac Signs</h3>
      <div class="data-row"><span class="label">Western:</span> <span id="westernZodiac"></span></div>
      <div class="data-row"><span class="label">Chinese:</span> <span id="chineseZodiac"></span></div>
    </div>
    <div class="card">
      <h3>🔢 Life Path</h3>
      <div class="data-row" id="lifePathNumber"></div>
    </div>
    <div class="card">
      <h3>🎨 Interests</h3>
      <div class="data-row" id="hobbies"></div>
    </div>
    <div class="card">
      <h3>🌈 Values</h3>
      <div class="data-row" id="values"></div>
    </div>
    <div class="card">
      <h3>🔗 Relationship Type</h3>
      <div class="data-row" id="relationshipType"></div>
    </div>
    <a class="btn" href="edit-profile.html">Edit Profile</a>
  </main>

  <script>
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
    });
    const data = JSON.parse(localStorage.getItem('soulQuiz')) || {};
    document.getElementById('name').textContent = data.name || '-';
    document.getElementById('birthday').textContent = data.birthday || '-';
    document.getElementById('country').textContent = data.country || '-';
    document.getElementById('loveLanguage').textContent = data.loveLanguage || '-';
    document.getElementById('westernZodiac').textContent = data.westernZodiac || '-';
    document.getElementById('chineseZodiac').textContent = data.chineseZodiac || '-';
    document.getElementById('lifePathNumber').textContent = data.lifePathNumber || '-';
    document.getElementById('hobbies').textContent = data.hobbies || '-';
    document.getElementById('values').textContent = data.values || '-';
    document.getElementById('relationshipType').textContent = data.relationshipType || '-';
  </script>
</body>
</html>
