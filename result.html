<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink – Your Soulprint Results</title>

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
  />

  <!-- Your global stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- Inline tweaks just for this page -->
  <style>
    body {
      background-color: #003c43;
      color: #eefefe;
    }
    header {
      background-color: #002c2f;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .nav-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem 2rem;
    }
    .nav-logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #2ae49d;
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .nav-links a {
      display: flex;
      align-items: center;
      color: #eefefe;
      font-weight: 500;
      padding: 0.4rem;
      border-radius: 8px;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .nav-links a i {
      margin-right: 0.4rem;
    }
    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      background: rgba(42,228,157,0.2);
      box-shadow: 0 0 8px rgba(42,228,157,0.6);
    }
    .auth-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .btn-outline {
      padding: 0.4rem 0.8rem;
      border: 1px solid #00ffd0;
      border-radius: 8px;
      background: transparent;
      color: #00ffd0;
      transition: background 0.3s, color 0.3s;
    }
    .btn-outline:hover {
      background: #00ffd0;
      color: #003c43;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <header>
    <div class="nav-wrap">
      <div class="nav-logo">Soulink</div>
      <ul class="nav-links">
        <li><a href="index.html"><i class="bi bi-house"></i>Home</a></li>
        <li><a href="quiz.html"><i class="bi bi-question-circle"></i>Quiz</a></li>
        <li><a href="edit-profile.html"><i class="bi bi-pencil-square"></i>Edit Profile</a></li>
        <li><a href="my-soul.html"><i class="bi bi-person"></i>My Soul</a></li>
        <li><a href="soul-chart.html"><i class="bi bi-graph-up"></i>Soul Chart</a></li>
        <li><a href="soul-coach.html"><i class="bi bi-chat-dots"></i>Soul Coach</a></li>
        <li><a href="soulink-match.html"><i class="bi bi-heart"></i>Match</a></li>
        <li><a href="friends.html"><i class="bi bi-people"></i>Friends</a></li>
        <li>
          <a href="result.html" aria-current="page">
            <i class="bi bi-bar-chart-line"></i>Results
          </a>
        </li>
      </ul>
      <div class="auth-buttons">
        <a href="login.html" class="btn-outline">Log In</a>
        <a href="signup.html" class="btn-outline">Sign Up</a>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">
    <div class="page-header">
      <h1>🌟 Your Soul Results</h1>
      <p>Here's what the universe reveals about you</p>
    </div>

    <div id="results-output">
      <!-- Your existing cards -->
      <div class="card" id="greeting-card"></div>
      <div class="card" id="love-card"></div>
      <div class="card" id="western-card"></div>
      <div class="card" id="chinese-card"></div>
      <div class="card" id="numerology-card"></div>
      <div class="card" id="ai-insight-card">
        <h3>🧠 AI Soul Insight</h3>
        <div id="ai-insight-content"></div>
      </div>
    </div>

    <div style="text-align:center; margin:2rem 0;">
      <button id="download-pdf" class="btn">⬇️ Download Your Soul PDF</button>
    </div>

    <section id="feedback">
      <h3>💬 Your Feedback</h3>
      <form id="feedback-form">
        <label>Your Email:</label>
        <input type="email" name="user_email" required/>

        <label>Page You Are On:</label>
        <input type="text" name="page" value="result.html" readonly/>

        <label>How would you rate it? (1–5)</label>
        <select name="rating">
          <option value="1">★☆☆☆☆ Poor</option>
          <option value="2">★★☆☆☆ Fair</option>
          <option value="3">★★★☆☆ Good</option>
          <option value="4">★★★★☆ Very Good</option>
          <option value="5" selected>★★★★★ Excellent</option>
        </select>

        <label>Your Feedback:</label>
        <textarea name="feedback" rows="4" placeholder="Write your thoughts…" required></textarea>

        <button type="submit" class="btn">Send Feedback</button>
      </form>
      <p id="feedback-message"></p>
    </section>
  </main>

  <!-- PDF + EmailJS scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script src="results.js" defer></script>
</body>
</html>
