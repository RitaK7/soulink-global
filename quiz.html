
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="main-nav">
    <div class="logo">Soulink</div>
    <nav>
      <ul>
        <li><a href="quiz.html" class="active">Quiz</a></li>
        <li><a href="my-soul.html">My Soul</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <form id="quiz-form">

      <div class="card">
        <h2>Type of Connection</h2>
        <label><input type="radio" name="connection" value="romantic" /> Romantic</label>
        <label><input type="radio" name="connection" value="friendship" /> Friendship</label>
        <label><input type="radio" name="connection" value="both" /> Both</label>
      </div>

      <div class="card">
        <h2>Love Language</h2>
        <label><input type="radio" name="loveLanguage" value="Words of Affirmation" /> Words of Affirmation</label>
        <label><input type="radio" name="loveLanguage" value="Acts of Service" /> Acts of Service</label>
        <label><input type="radio" name="loveLanguage" value="Receiving Gifts" /> Receiving Gifts</label>
        <label><input type="radio" name="loveLanguage" value="Quality Time" /> Quality Time</label>
        <label><input type="radio" name="loveLanguage" value="Physical Touch" /> Physical Touch</label>
      </div>

      <div class="card">
        <h2>Select Your Country</h2>
        <select name="country">
          <option value="">Select a country</option>
          <option>United States</option>
          <option>Canada</option>
          <option>Lithuania</option>
          <option>Norway</option>
          <option>Germany</option>
          <option>France</option>
          <option>Italy</option>
          <option>Japan</option>
          <option>Brazil</option>
          <option>Australia</option>
        </select>
      </div>

      <div class="card">
        <h2>Select Your Hobbies</h2>
        <label><input type="checkbox" name="hobbies" value="Music" /> Music</label>
        <label><input type="checkbox" name="hobbies" value="Art" /> Art</label>
        <label><input type="checkbox" name="hobbies" value="Travel" /> Travel</label>
        <label><input type="checkbox" name="hobbies" value="Nature" /> Nature</label>
      </div>

      <div class="card">
        <h2>Values Most Important to You</h2>
        <label><input type="checkbox" name="values" value="Loyalty" /> Loyalty</label>
        <label><input type="checkbox" name="values" value="Honesty" /> Honesty</label>
        <label><input type="checkbox" name="values" value="Freedom" /> Freedom</label>
        <label><input type="checkbox" name="values" value="Spirituality" /> Spirituality</label>
      </div>

      <div class="buttons">
        <button type="submit" class="btn">See Results</button>
      </div>

    </form>
  </main>

  <script src="quiz.js"></script>
</body>
</html>
