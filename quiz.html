<!-- quiz.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink – Soul Compatibility Quiz</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <script>
    // Beta‑access gate
    if (!sessionStorage.getItem('soulinkBetaAccess') && location.pathname !== '/beta-login.html') {
      window.location.href = 'beta-login.html';
    }
  </script>
</head>
<body>
  <!-- NAVBAR -->
  <header class="main-nav">
    <div class="logo">Soulink</div>
    <button id="navToggle" class="nav-toggle"><i class="bi bi-list"></i></button>
    <nav>
      <ul class="nav-links">
        <!-- ... your links here ... -->
      </ul>
      <div class="auth-buttons">
        <a class="btn-outline" href="login.html">Log In</a>
        <a class="btn-outline" href="signup.html">Sign Up</a>
      </div>
    </nav>
  </header>

  <!-- QUIZ FORM -->
  <main class="container">
    <h1>🌈 Soul Compatibility Quiz</h1>
    <noscript>
      <div class="alert">JavaScript is required to use this quiz. Please enable JS and reload.</div>
    </noscript>
    <form id="quizForm" class="quiz-form">
      <div class="cards">

        <!-- Name -->
        <div class="card rounded shadow">
          <label for="name">Name</label>
          <input id="name" name="name" required type="text"/>
        </div>

        <!-- Birthdate -->
        <div class="card rounded shadow">
          <label for="birthdate">Birth Date <small>(YYYY‑MM‑DD)</small></label>
          <input id="birthdate" name="birthdate" required type="date" placeholder="1978-11-22"/>
        </div>

        <!-- Western Zodiac (auto) -->
        <div class="card rounded shadow">
          <label for="westernZodiac">Western Zodiac</label>
          <input id="westernZodiac" name="westernZodiac" readonly type="text"/>
        </div>

        <!-- Chinese Zodiac (auto) -->
        <div class="card rounded shadow">
          <label for="chineseZodiac">Chinese Zodiac</label>
          <input id="chineseZodiac" name="chineseZodiac" readonly type="text"/>
        </div>

        <!-- Country -->
        <div class="card rounded shadow">
          <label for="country">Country</label>
          <select id="country" name="country" required>
            <option value="">— Select your country —</option>
            <!-- ... full list as before ... -->
          </select>
        </div>

        <!-- Height & Weight -->
        <div class="card rounded shadow inline-group">
          <div class="flex-1">
            <label for="height">Height (cm)</label>
            <input id="height" name="height" type="number" min="0"/>
          </div>
          <div class="flex-1">
            <label for="weight">Weight (kg)</label>
            <input id="weight" name="weight" type="number" min="0"/>
          </div>
        </div>

        <!-- Connection Type -->
        <div class="card rounded shadow">
          <label>Type of Connection</label>
          <div class="inline-group">
            <label><input name="connectionType" type="radio" value="Romantic" required/> Romantic</label>
            <label><input name="connectionType" type="radio" value="Friendship"/> Friendship</label>
            <label><input name="connectionType" type="radio" value="Both"/> Both</label>
          </div>
        </div>

        <!-- Love Language -->
        <div class="card rounded shadow">
          <label>Primary Love Language</label>
          <div class="radio-group">
            <label><input name="loveLanguage" type="radio" value="Words of Affirmation" required/> Words of Affirmation</label>
            <label><input name="loveLanguage" type="radio" value="Acts of Service"/> Acts of Service</label>
            <label><input name="loveLanguage" type="radio" value="Receiving Gifts"/> Receiving Gifts</label>
            <label><input name="loveLanguage" type="radio" value="Quality Time"/> Quality Time</label>
            <label><input name="loveLanguage" type="radio" value="Physical Touch"/> Physical Touch</label>
          </div>
        </div>

        <!-- Love Language Description (auto) -->
        <div class="card rounded shadow">
          <label for="loveDescription">Love Language Description</label>
          <textarea id="loveDescription" name="loveDescription" readonly rows="2"></textarea>
        </div>

        <!-- Hobbies -->
        <div class="card rounded shadow">
          <label>Select Your Hobbies</label>
          <div class="inline-group">
            <!-- ... checkboxes ... -->
          </div>
        </div>

        <!-- Values -->
        <div class="card rounded shadow">
          <label>Values Most Important to You</label>
          <div class="inline-group">
            <!-- ... checkboxes ... -->
          </div>
        </div>

        <!-- Free‐text fields -->
        <div class="card rounded shadow">
          <label for="unacceptable">What Is Unacceptable in Relationships?</label>
          <textarea id="unacceptable" name="unacceptable" rows="2" placeholder="e.g. dishonesty…"></textarea>
        </div>
        <div class="card rounded shadow">
          <label for="about">Tell Us More About Yourself</label>
          <textarea id="about" name="about" rows="4" placeholder="Your story…"></textarea>
        </div>

      </div>

      <button class="btn-submit" type="submit">
        Save &amp; Continue <i class="bi bi-arrow-right-circle"></i>
      </button>
    </form>
  </main>

  <footer class="site-footer">© 2025 soulink.global</footer>

  <script src="quiz.js" defer></script>
</body>
</html>
