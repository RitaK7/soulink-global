<!-- edit-profile.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink – Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --bg: #003c43;
      --card: #004d4d;
      --text: #eefefe;
      --accent: #00fdd8;
      --glow: rgba(0,253,216,0.6);
    }
    * { box-sizing: border-box; }
    body {
      margin:0; padding:0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
    }
    header {
      background: var(--card);
      padding: 0.8rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .logo { font-size:1.4rem; color: var(--accent); }
    nav ul { list-style:none; margin:0; padding:0; display:flex; gap:1rem; }
    nav a { color: var(--text); text-decoration:none; font-size:0.9rem; display:flex; align-items:center; }
    nav a i { margin-right:0.3rem; }
    main {
      padding:1rem;
      display:flex; justify-content:center;
    }
    .profile-card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 0 12px var(--glow);
    }
    .field-row {
      display: flex; justify-content: space-between; align-items: center;
      padding:0.7rem 0; border-bottom:1px solid rgba(255,255,255,0.1);
    }
    .field-row:last-child { border-bottom:none; }
    .field-label { font-weight:600; }
    .field-value { flex:1; margin:0 0.5rem; word-break:break-word; }
    .field-value.empty { opacity:0.6; }
    .field-row i {
      cursor:pointer; color: var(--accent); font-size:1.1rem;
      transition: transform .2s;
    }
    .field-row i:hover { transform: scale(1.2); }
    .photos {
      display:flex; gap:0.7rem; padding:0.7rem 0;
    }
    .photos img {
      width:80px; height:80px; object-fit:cover;
      border-radius:8px;
      box-shadow:0 0 8px var(--glow);
      cursor:pointer;
    }
    .photos input {
      display:none;
    }
    .btn-save {
      margin-top:1rem;
      width:100%;
      padding:0.8rem;
      background: var(--accent);
      color: var(--bg);
      border:none; border-radius:30px;
      font-size:1rem; font-weight:600;
      box-shadow:0 0 20px var(--glow);
      cursor:pointer;
      transition: transform .2s, box-shadow .3s;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow:0 0 30px var(--glow);
    }
    @media(max-width:480px) {
      .field-row { flex-direction: column; align-items: flex-start; }
      .field-row i { align-self: flex-end; margin-top:0.3rem; }
      .photos { justify-content: space-between; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Soulink</div>
    <nav id="navMenu">
        <a href="index.html" aria-current="page"><i class="bi bi-house"></i> Home</a>
        <a href="quiz.html"><i class="bi bi-question-circle"></i> Quiz</a>
        <a href="edit-profile.html"><i class="bi bi-pencil-square"></i> Edit Profile</a>
        <a href="my-soul.html"><i class="bi bi-person"></i> My Soul</a>
        <a href="soul-chart.html"><i class="bi bi-graph-up"></i> Soul Chart</a>
        <a href="soul-coach.html"><i class="bi bi-chat-dots"></i> Soul Coach</a>
        <a href="match.html"><i class="bi bi-link-45deg"></i> Match</a>
        <a href="friends.html"><i class="bi bi-people"></i> Friends</a>
        <a href="result.html"><i class="bi bi-award"></i> Result</a>
      </nav>
  </header>

  <main>
    <div class="profile-card" id="profileCard">
      <!-- Inline editable fields -->
      <div class="field-row">
        <div class="field-label">Name</div>
        <div class="field-value empty" id="edit-name">–</div>
        <i class="bi bi-pencil-square" onclick="editField('name')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Birthday</div>
        <div class="field-value empty" id="edit-birthday">–</div>
        <i class="bi bi-pencil-square" onclick="editField('birthday')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">About / Bio</div>
        <div class="field-value empty" id="edit-about">–</div>
        <i class="bi bi-pencil-square" onclick="editField('about')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Connection</div>
        <div class="field-value empty" id="edit-relationshipType">–</div>
        <i class="bi bi-pencil-square" onclick="editField('relationshipType','Romantic,Friendship,Both')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Love Language</div>
        <div class="field-value empty" id="edit-loveLanguage">–</div>
        <i class="bi bi-pencil-square" onclick="editField('loveLanguage','Words of Affirmation,Acts of Service,Receiving Gifts,Quality Time,Physical Touch')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Love Description</div>
        <div class="field-value empty" id="edit-loveLanguageDesc">–</div>
        <i class="bi bi-pencil-square" onclick="alert('This is auto‑generated from Love Language.')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Hobbies</div>
        <div class="field-value empty" id="edit-hobbies">–</div>
        <i class="bi bi-pencil-square" onclick="editField('hobbies')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Values</div>
        <div class="field-value empty" id="edit-values">–</div>
        <i class="bi bi-pencil-square" onclick="editField('values')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Unacceptable</div>
        <div class="field-value empty" id="edit-unacceptable">–</div>
        <i class="bi bi-pencil-square" onclick="editField('unacceptable')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Country</div>
        <div class="field-value empty" id="edit-country">–</div>
        <i class="bi bi-pencil-square" onclick="editField('country')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Height (cm)</div>
        <div class="field-value empty" id="edit-height">–</div>
        <i class="bi bi-pencil-square" onclick="editField('height')"></i>
      </div>
      <div class="field-row">
        <div class="field-label">Weight (kg)</div>
        <div class="field-value empty" id="edit-weight">–</div>
        <i class="bi bi-pencil-square" onclick="editField('weight')"></i>
      </div>

      <!-- Photos -->
      <div class="field-label" style="padding-top:0.7rem;">Profile Photos</div>
      <div class="photos">
        <label><img id="photoPreview1" src="" alt="Photo 1" onclick="document.getElementById('photoInput1').click()"/></label>
        <label><img id="photoPreview2" src="" alt="Photo 2" onclick="document.getElementById('photoInput2').click()"/></label>
        <label><img id="photoPreview3" src="" alt="Photo 3" onclick="document.getElementById('photoInput3').click()"/></label>
      </div>
      <input type="file" id="photoInput1" accept="image/*"/>
      <input type="file" id="photoInput2" accept="image/*"/>
      <input type="file" id="photoInput3" accept="image/*"/>

      <button class="btn-save" onclick="saveAndGo()">Save Profile 💾</button>
    </div>
  </main>

  <script src="edit-profile.js"></script>
</body>
</html>
