<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile – Soulink</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <style>
    body {
      background-color: #003c43;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 800px;
      margin: 5rem auto;
      padding: 2rem;
      border-radius: 1rem;
      background-color: #004d4d;
      box-shadow: 0 0 20px #00fdd8;
    }
    .field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid #006f70;
    }
    .field label {
      font-weight: bold;
    }
    .field .value {
      flex: 1;
      margin-left: 1rem;
    }
    .edit-btn {
      background: none;
      border: none;
      color: #00fdd8;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .profile-photo {
      width: 100px;
      height: 100px;
      border-radius: 1rem;
      object-fit: cover;
      box-shadow: 0 0 10px #00fdd8;
    }
    .save-btn {
      margin-top: 2rem;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      background-color: #00fdd8;
      color: black;
      border: none;
      border-radius: 1rem;
      cursor: pointer;
    }
    .section-title {
      font-size: 1.2rem;
      margin: 1.5rem 0 0.5rem;
      color: #00fdd8;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      background-color: #002f34;
    }
    .nav a {
      color: white;
      text-decoration: none;
      margin: 0 1rem;
    }
    @media screen and (max-width: 600px) {
      .field {
        flex-direction: column;
        align-items: flex-start;
      }
      .field .value {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div>Soulink</div>
    <div>
      <a href="index.html" aria-current="page"><i class="bi bi-house"></i> Home</a>
        <a href="quiz.html"><i class="bi bi-question-circle"></i> Quiz</a>
        <a href="edit-profile.html"><i class="bi bi-pencil-square"></i> Edit Profile</a>
        <a href="my-soul.html"><i class="bi bi-person"></i> My Soul</a>
        <a href="soul-chart.html"><i class="bi bi-graph-up"></i> Soul Chart</a>
        <a href="soul-coach.html"><i class="bi bi-chat-dots"></i> Soul Coach</a>
        <a href="match.html"><i class="bi bi-link-45deg"></i> Match</a>
        <a href="friends.html"><i class="bi bi-people"></i> Friends</a>
        <a href="result.html"><i class="bi bi-award"></i> Result</a>
    </div>
  </nav>

  <div class="container">
    <h2 class="section-title">✨ Edit Your Soul Profile</h2>

    <div class="field"><label>Name:</label><div class="value" id="nameValue"></div><button class="edit-btn" onclick="editField('name')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>Birthday:</label><div class="value" id="birthdayValue"></div><button class="edit-btn" onclick="editField('birthday')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>Type:</label><div class="value" id="relationshipTypeValue"></div><button class="edit-btn" onclick="editField('relationshipType')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>Love Language:</label><div class="value" id="loveLanguageValue"></div><button class="edit-btn" onclick="editField('loveLanguage')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>Hobbies:</label><div class="value" id="hobbiesValue"></div><button class="edit-btn" onclick="editField('hobbies')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>Values:</label><div class="value" id="valuesValue"></div><button class="edit-btn" onclick="editField('values')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>Unacceptable:</label><div class="value" id="unacceptableValue"></div><button class="edit-btn" onclick="editField('unacceptable')"><i class="bi bi-pencil"></i></button></div>
    <div class="field"><label>About:</label><div class="value" id="aboutValue"></div><button class="edit-btn" onclick="editField('about')"><i class="bi bi-pencil"></i></button></div>
    <div class="field">
      <label>Profile Photos:</label>
      <div class="value">
        <img id="photo1" class="profile-photo" />
        <img id="photo2" class="profile-photo" />
        <img id="photo3" class="profile-photo" />
      </div>
    </div>

    <button class="save-btn" onclick="saveProfile()">💾 Save Profile</button>
  </div>

  <script src="edit-profile.js"></script>
</body>
</html>
