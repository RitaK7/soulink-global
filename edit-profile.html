<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink – Edit Profile</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Only overrides specific to edit‑profile */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .photo-slot img {
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,253,216,0.6);
      cursor: pointer;
    }
    .photo-slot button {
      width: 100%;
      margin-top: 0.3rem;
      background: #00fdd8;
      color: #003c43;
      border: none;
      border-radius: 6px;
      padding: 0.3rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    @media(max-width: 600px) {
      /* stack photos on mobile */
      .photo-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR (same as quiz.html) -->
  <header class="main-nav">
    <div class="logo">Soulink</div>
    <button id="navToggle" class="nav-toggle"><i class="bi bi-list"></i></button>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html"><i class="bi bi-house"></i>Home</a></li>
        <li><a href="quiz.html"><i class="bi bi-question-circle"></i>Quiz</a></li>
        <li><a href="edit-profile.html" aria-current="page"><i class="bi bi-pencil-square"></i>Edit Profile</a></li>
        <li><a href="my-soul.html"><i class="bi bi-person"></i>My Soul</a></li>
        <li><a href="soul-chart.html"><i class="bi bi-graph-up"></i>Soul Chart</a></li>
        <li><a href="soul-coach.html"><i class="bi bi-chat-dots"></i>Soul Coach</a></li>
        <li><a href="soulink-match.html"><i class="bi bi-heart"></i>Match</a></li>
        <li><a href="friends.html"><i class="bi bi-people"></i>Friends</a></li>
        <li><a href="result.html"><i class="bi bi-bar-chart-line"></i>Results</a></li>
      </ul>
      <div class="auth-buttons">
        <a class="btn-outline" href="login.html">Log In</a>
        <a class="btn-outline" href="signup.html">Sign Up</a>
      </div>
    </nav>
  </header>

  <!-- EDIT PROFILE FORM -->
  <main class="container">
    <div class="card rounded shadow p-4 mt-4">
      <h2 class="text-accent mb-4">✨ Edit Your Soul Profile</h2>
      <!-- Inline fields -->
      <div id="fields"></div>

      <!-- Photos -->
      <h3 class="mt-4">Profile Photos</h3>
      <div class="photo-grid" id="photoGrid"></div>

      <button id="saveBtn" class="btn-submit w-full mt-4">Save Profile 💾</button>
    </div>
  </main>

  <footer class="site-footer mt-auto py-3">
    © 2025 soulink.global
  </footer>

  <script src="edit-profile.js" defer></script>
  <script>
    // Mobile nav toggle
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('.nav-links').classList.toggle('open');
      document.querySelector('.auth-buttons').classList.toggle('open');
    });
  </script>
</body>
</html>
