<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Your Soul Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="index.html" aria-current="page"><i class="bi bi-house"></i> Home</a>
        <a href="quiz.html"><i class="bi bi-question-circle"></i> Quiz</a>
        <a href="edit-profile.html"><i class="bi bi-pencil-square"></i> Edit Profile</a>
        <a href="my-soul.html"><i class="bi bi-person"></i> My Soul</a>
        <a href="soul-chart.html"><i class="bi bi-graph-up"></i> Soul Chart</a>
        <a href="soul-coach.html"><i class="bi bi-chat-dots"></i> Soul Coach</a>
        <a href="match.html"><i class="bi bi-link-45deg"></i> Match</a>
        <a href="friends.html"><i class="bi bi-people"></i> Friends</a>
        <a href="result.html"><i class="bi bi-award"></i> Result</a>
    </nav>
  </header>

  <main class="container">
    <h2>✨ Edit Your Soul Profile</h2>
    <div class="profile-section">
      <div><strong>Name:</strong> <span id="nameDisplay"></span> <button id="edit-name">✎</button></div>
      <div><strong>Birthday:</strong> <span id="birthdayDisplay"></span> <button id="edit-birthday">✎</button></div>
      <div><strong>Type:</strong> <span id="typeDisplay"></span> <button id="edit-type">✎</button></div>
      <div><strong>Love Language:</strong> <span id="languageDisplay"></span> <button id="edit-language">✎</button></div>
      <div><strong>Hobbies:</strong> <span id="hobbiesDisplay"></span> <button id="edit-hobbies">✎</button></div>
      <div><strong>Values:</strong> <span id="valuesDisplay"></span> <button id="edit-values">✎</button></div>
      <div><strong>Unacceptable:</strong> <span id="unacceptableDisplay"></span> <button id="edit-unacceptable">✎</button></div>
      <div><strong>About:</strong> <span id="aboutDisplay"></span> <button id="edit-about">✎</button></div>
      <div><strong>Profile Photos:</strong>
        <div class="photos">
          <img id="photo1Preview" src="" width="100" height="100" />
          <img id="photo2Preview" src="" width="100" height="100" />
          <img id="photo3Preview" src="" width="100" height="100" />
        </div>
      </div>
    </div>
    <button id="saveBtn">💾 Save Profile</button>
  </main>

  <script src="edit-profile.js"></script>
</body>
</html>
