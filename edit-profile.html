
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="edit-profile-body">
  <header class="navbar">
    <div class="logo">Soulink</div>
    <nav>
      <a href="quiz.html">← Back to Quiz</a>
      <a href="my-soul.html">Go to My Soul →</a>
    </nav>
  </header>

  <main>
    <h1>Edit Your Soul Profile ✨</h1>
    <form id="editProfileForm" class="form-container">
      <label>Name:<input type="text" name="name" id="name" /></label>
      <label>Birthday:<input type="text" name="birthday" id="birthday" placeholder="YYYY-MM-DD"/></label>
      <label>About:<textarea name="about" id="about" placeholder="Tell us more about you..."></textarea></label>

      <label>Type of Connection:
        <select id="relationshipType" name="relationshipType">
          <option value="Romantic">Romantic</option>
          <option value="Friendship">Friendship</option>
          <option value="Both">Both</option>
        </select>
      </label>

      <label>Love Language:
        <select id="loveLanguage" name="loveLanguage">
          <option value="Words of Affirmation">Words of Affirmation</option>
          <option value="Acts of Service">Acts of Service</option>
          <option value="Receiving Gifts">Receiving Gifts</option>
          <option value="Quality Time">Quality Time</option>
          <option value="Physical Touch">Physical Touch</option>
        </select>
      </label>

      <label>Hobbies:<input type="text" name="hobbies" id="hobbies" placeholder="Reading, dancing, hiking..."/></label>
      <label>Values:<input type="text" name="values" id="values" placeholder="Honesty, kindness..."/></label>
      <label>Unacceptable in Relationship:<textarea id="unacceptable" name="unacceptable" placeholder="Dishonesty, aggression..."></textarea></label>

      <div class="photo-section">
        <label>Profile Photo 1:<input type="file" id="profilePhoto1" accept="image/*"/></label>
        <img id="preview1" class="photo-preview" alt="Preview 1"/>
        <label>Profile Photo 2:<input type="file" id="profilePhoto2" accept="image/*"/></label>
        <img id="preview2" class="photo-preview" alt="Preview 2"/>
        <label>Profile Photo 3:<input type="file" id="profilePhoto3" accept="image/*"/></label>
        <img id="preview3" class="photo-preview" alt="Preview 3"/>
      </div>

      <button type="submit" class="save-btn">💾 Save Profile</button>
    </form>
  </main>

  <footer>
    <p>© 2025 Soulink. All rights reserved.</p>
  </footer>

  <script src="edit-profile.js"></script>
</body>
</html>
