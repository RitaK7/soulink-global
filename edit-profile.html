<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soulink – Edit Profile</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --bg: #003c43;
      --card-bg: #004d4d;
      --text: #eefefe;
      --accent: #00fdd8;
      --glow: rgba(0,253,216,0.6);
      --radius: 12px;
      --spacing: 1rem;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; min-height:100vh; }
    header.main-nav {
      background:var(--card-bg); padding:0.75rem 1rem;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo { font-size:1.5rem; color:var(--accent); font-weight:bold; }
    .nav-toggle { display:none; background:none; border:none; color:var(--text); font-size:1.5rem; }
    nav { display:flex; gap:1rem; align-items:center; }
    nav a {
      color:var(--text); text-decoration:none;
      padding:0.4rem 0.8rem; border-radius:6px;
      transition:background .2s,box-shadow .2s;
      display:flex; align-items:center; font-size:0.9rem;
    }
    nav a[aria-current="page"], nav a:hover {
      background:rgba(0,253,216,0.2); box-shadow:0 0 8px var(--glow);
    }
    .auth-buttons { display:flex; gap:0.5rem; }
    .btn-outline {
      color:var(--text); border:1px solid var(--accent);
      padding:0.3rem 0.6rem; border-radius:6px;
      transition:background .2s,color .2s;
    }
    .btn-outline:hover { background:var(--accent); color:var(--bg); }
    main.container {
      flex:1; width:90%; max-width:800px;
      margin:var(--spacing) auto; padding:0 var(--spacing);
    }
    .card {
      background:var(--card-bg); border-radius:var(--radius);
      padding:var(--spacing); box-shadow:0 0 12px var(--glow);
      margin-bottom:var(--spacing);
    }
    .card h2 { font-size:1.4rem; margin-bottom:var(--spacing); color:var(--accent); }
    .field-row {
      display:grid; grid-template-columns:1fr auto;
      align-items:center; padding:0.6rem 0;
      border-bottom:1px solid rgba(255,255,255,0.1);
    }
    .field-row:last-child { border-bottom:none; }
    .field-label { font-weight:600; font-size:0.95rem; }
    .field-value { margin-left:var(--spacing); font-size:0.93rem; overflow-wrap:anywhere; }
    .field-value.empty { opacity:0.7; }
    .field-row i {
      color:var(--accent); cursor:pointer; font-size:1.1rem;
      transition:transform .2s; margin-left:var(--spacing);
    }
    .field-row i:hover { transform:scale(1.2); }
    .photo-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:1rem; margin-top:var(--spacing);
    }
    .photo-slot { text-align:center; }
    .photo-slot img {
      width:100%; height:100px; object-fit:cover;
      border-radius:8px; box-shadow:0 0 8px var(--glow);
      cursor:pointer;
    }
    .photo-slot button {
      margin-top:0.4rem; width:100%; padding:0.4rem;
      background:var(--accent); color:var(--bg); border:none;
      border-radius:6px; font-size:0.85rem; cursor:pointer;
    }
    .photo-slot input[type=file] { display:none; }
    .btn-save, .nav-button {
      display:block; margin:var(--spacing) auto; width:200px;
      padding:0.6rem; background:var(--accent); color:var(--bg);
      border:none; border-radius:30px; font-size:1rem; font-weight:600;
      box-shadow:0 0 20px var(--glow); text-align:center;
      transition:transform .2s,box-shadow .3s;
    }
    .btn-save:hover, .nav-button:hover {
      transform:translateY(-2px); box-shadow:0 0 30px var(--glow);
    }
    footer.site-footer {
      text-align:center; padding:1rem 0; font-size:0.85rem;
    }
    @media(max-width:700px){
      .nav-toggle { display:block; }
      nav { display:none; flex-direction:column; background:var(--card-bg); padding:1rem; gap:1rem; }
      nav.open { display:flex; }
      .auth-buttons { display:none; }
      .field-row { grid-template-columns:1fr; }
      .field-row i { justify-self:end; margin-top:0.3rem; }
      .btn-save, .nav-button { width:100%; max-width:300px; }
    }
  </style>
</head>
<body>
  <header class="main-nav">
    <div class="logo">Soulink</div>
    <button id="navToggle" class="nav-toggle"><i class="bi bi-list"></i></button>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html"><i class="bi bi-house"></i>Home</a></li>
        <li><a href="quiz.html"><i class="bi bi-question-circle"></i>Quiz</a></li>
        <li><a href="edit-profile.html" aria-current="page"><i class="bi bi-pencil-square"></i>Edit Profile</a></li>
        <li><a href="my-soul.html"><i class="bi bi-person"></i>My Soul</a></li>
        <li><a href="soul-chart.html"><i class="bi bi-graph-up"></i>Soul Chart</a></li>
        <li><a href="soul-coach.html"><i class="bi bi-chat-dots"></i>Soul Coach</a></li>
        <li><a href="soulink-match.html"><i class="bi bi-heart"></i>Match</a></li>
        <li><a href="friends.html"><i class="bi bi-people"></i>Friends</a></li>
        <li><a href="result.html"><i class="bi bi-bar-chart-line"></i>Results</a></li>
      </ul>
      <div class="auth-buttons">
        <a href="login.html" class="btn-outline">Log In</a>
        <a href="signup.html" class="btn-outline">Sign Up</a>
      </div>
    </nav>
  </header>
  <main class="container">
    <div class="card">
      <h2>✨ Edit Your Soul Profile</h2>
      <div id="fields"></div>
      <div style="display:flex; justify-content:space-between; margin-top:var(--spacing);">
        <button class="nav-button" onclick="location.href='quiz.html'">← Back to Quiz</button>
        <button class="nav-button" onclick="location.href='my-soul.html'">Go to My Soul →</button>
      </div>
      <h3 style="margin-top:var(--spacing)">Profile Photos</h3>
      <div class="photo-grid" id="photoGrid"></div>
      <button id="saveBtn" class="btn-save">💾 Save Profile</button>
    </div>
  </main>
  <footer class="site-footer">© 2025 soulink.global</footer>
  <script src="edit-profile.js"></script>
  <script>
    document.getElementById('navToggle').addEventListener('click', () => {
      document.querySelector('nav').classList.toggle('open');
    });
  </script>
</body>
</html>
